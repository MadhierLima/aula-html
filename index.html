<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula de html</title>
    <style>
        h1 {
            color: #003740;
            font-size: 32px;
            text-align: center;
        }

        p {
            border: solid #000 1px;
            padding: 25px;
        }

        #engracado {
            margin: 10px 12px 10px 25px;
        }

        .destaque {
            border-left: solid 3px red;
        }
    </style>
</head>
<body>
    <h1>Título da página</h1>
    <a href="pagina2.html">Link para outra página</a>
    <p>Texto simples sem estilos</p>
    <p id="engracado">Texto simples sem estilos</p>
    <p class="destaque">Texto simples sem estilos</p>
</body>
</html>
